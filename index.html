    <!DOCTYPE html>
    <html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISIONAR</title>

    <style>
    .topbar{
    background:white;
    color:black;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    border-bottom:1px solid #ddd;
    }

    /* NAVBAR */

    .navbar{
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    gap:30px;
    padding:10px 20px;
    }

    .menu{
    display:flex;
    gap:25px;
    }

    .menu span{
    cursor:pointer;
    font-weight:bold;
    }

    .menu span:hover{
    opacity:0.7;
    }

    /* SUBMENU */

    .submenu{
    background:white;
    display:flex;
    gap:20px;
    padding:10px 20px;
    border-bottom:1px solid #ddd;
    }

    .submenu span{
    cursor:pointer;
    }
    body{
    font-family:Arial;
    margin:0;
    background:#f4f4f4;
    }

    .header{
    background:#111;
    color:white;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:24px;
    }
    .logo{
    height:40px;
    }

    .logo-right{
    position:absolute;
    right:10px;
    height:50px;
    }

    .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:20px;
    padding:20px;
    }
    .card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    padding-bottom:10px;
    }

    .card img{
    width:100%;
    height:200px;
    object-fit:cover;
    }

    .card h3{
    margin:10px;
    font-size:18px;
    }

    .card p{
    margin:10px;
    font-weight:bold;
    }

    .card button{
    margin:10px;
    padding:10px;
    border:none;
    background:black;
    color:white;
    border-radius:6px;
    cursor:pointer;
    width:90%;
    }

    .agotado{
    opacity:0.5;
    }

    .modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    }

    .modal-content{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:500px;
    width:90%;
    }

    .option-btn{
    padding:6px 12px;
    margin:2px;
    border:1px solid #ccc;
    background:white;
    border-radius:5px;
    cursor:pointer;
    white-space:nowrap;
    min-width:70px;
    flex-shrink:0;
    }
    .option-btn:first-child{
    margin-left:auto;
    }

    .option-btn:last-child{
    margin-right:auto;
    }

    .whatsapp-float{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px 20px;
    border-radius:40px;
    text-decoration:none;
    font-weight:bold;
    }
    .option-btn.selected{
    background:black;
    color:white;
    opacity:1;
    }

    .option-btn.unselected{
    opacity:0.4;
    }
    .option-btn.active{
    background:#111;
    color:white;
    border:1px solid #111;
    opacity:1;
    }

    .option-btn{
    transition:all 0.2s ease;
    }
    #filtrosCategoria,
    #filtrosSubcategoria,
    #filtrosGenero{
    display:flex;
    flex-wrap:nowrap;
    overflow-x:auto;
    gap:6px;
    padding:4px 0;

    }
    @media (max-width: 768px){

    .grid{
    grid-template-columns:repeat(2,1fr);
    }

    }
    </style>

    </head>
    <body>

    <div class="topbar">
    <span id="textoRotativo">VISIONAR</span>
    </div>

    <div class="navbar">

    <img src="LOGO.png" class="logo">

    <div id="menuCategorias" class="menu"></div>

    </div>

    <div id="submenu" class="submenu"></div>


    <div style="padding:10px;text-align:center;">

        
    <div style="padding:10px;text-align:center;">



    </div>
    <div class="grid" id="catalogo"></div>


    <div class="modal" id="modal">
    <div class="modal-content">

    <h2 id="mNombre"></h2>
    <img id="mImagen" style="width:100%;border-radius:10px">
    <p id="mPrecio"></p>
    <p id="mDescripcion"></p>

    <h4>Color</h4>
    <div id="colores"></div>

    <div id="seccionTallas"></div>
    <br>
    <button id="comprarBtn">Consultar por WhatsApp</button>
    <br><br>
    <button onclick="cerrarModal()">Cerrar</button>
    </div>
    </div>

    <a id="whatsappPrincipal" class="whatsapp-float"
    target="_blank"
    href="https://wa.me/593999131523?text=Hola quiero informacion de tus productos">
    WhatsApp
    </a>

    <script>

    const SHEET_ID = "1iyraS1XHHmAshoeK9p8s5tNUTg-nC3pRw7vHNxut3eU";

    const URL_PRODUCTOS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Productos`;
    const URL_VARIANTES = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Variantes`;

    let productos=[];
    let variantes=[];
    let seleccion={};
    let filtroCategoria=null;
    let filtroSubcategoria=null;
    function parseCSV(text){

    const rows=text.trim().split("\n");
    const headers=rows[0].split(",").map(h=>h.replace(/"/g,'').trim());

    return rows.slice(1).map(row=>{

    const values=row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    let obj={};

    headers.forEach((h,i)=>{
    obj[h]=values[i]?.replace(/"/g,'').trim();
    });
    return obj;
    });
    }

    async function cargarDatos(){

    const textos=[
    "VISIONAR",
    "ENVIOS GRATIS DESDE $100",
    "PRENDAS Y TECNOLOGIA"
    ];

    let indexTexto=0;

    setInterval(()=>{

    indexTexto++;

    if(indexTexto>=textos.length){
    indexTexto=0;
    }

    document.getElementById("textoRotativo").innerText=textos[indexTexto];

    },3000);

    const p=await fetch(URL_PRODUCTOS).then(r=>r.text());
    const v=await fetch(URL_VARIANTES).then(r=>r.text());

    productos=parseCSV(p);
    variantes=parseCSV(v);

    crearFiltros();
    renderCatalogo();

    }
    function crearFiltros(){

const categorias=[...new Set(productos.map(p=>p.Categoria).filter(Boolean))];

const menu=document.getElementById("menuCategorias");
menu.innerHTML="";

/* BOTON TODOS */

const todos=document.createElement("span");
todos.innerText="Todos";

todos.onclick=()=>{
filtroCategoria=null;
filtroSubcategoria=null;

document.getElementById("submenu").innerHTML="";
renderCatalogo();
};

menu.appendChild(todos);

/* CATEGORIAS DEL SHEET */

categorias.forEach(c=>{

const item=document.createElement("span");
item.innerText=c;

item.onclick=()=>mostrarSubcategorias(c);

menu.appendChild(item);

});

}

    function mostrarSubcategorias(categoria){

    filtroCategoria=categoria;
    filtroSubcategoria=null;

    const subs=[...new Set(
    productos
    .filter(p=>p.Categoria===categoria)
    .map(p=>p.Subcategoria)
    .filter(Boolean)
    )];

    const submenu=document.getElementById("submenu");
    submenu.innerHTML="";

    subs.forEach(s=>{

    const item=document.createElement("span");
    item.innerText=s;

    item.onclick=()=>{

    filtroSubcategoria=s;
    renderCatalogo();

    };

    submenu.appendChild(item);

    });

    renderCatalogo();

    }
    function renderCatalogo(){

    const cont=document.getElementById("catalogo");
    cont.innerHTML="";

    let lista=productos.filter(p=>{

    let ok=true;

    if(filtroCategoria)
    ok = ok && p.Categoria?.toLowerCase().trim() === filtroCategoria?.toLowerCase().trim();

    if(filtroSubcategoria)
    ok = ok && p.Subcategoria?.toLowerCase().trim() === filtroSubcategoria?.toLowerCase().trim();

    return ok;

    });

    lista.forEach(p=>{

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
    <img src="${p.Imagen}">
    <h3>${p.Nombre}</h3>
    <p>$${p.Precio}</p>
    <button onclick="abrirModal('${p.ID}')">
    Ver producto
    </button>
    `;

    cont.appendChild(card);

    });

    }
    function abrirModal(id){

    const producto=productos.find(p=>p.ID===id);

    seleccion.producto=producto;
    seleccion.color=null;
    seleccion.talla=null;

    document.getElementById("mNombre").innerText=producto.Nombre;
    document.getElementById("mImagen").src=producto.Imagen;
    document.getElementById("mPrecio").innerText="$"+producto.Precio;
    document.getElementById("mDescripcion").innerText=producto.Descripcion;

    const vars=variantes.filter(v=>v.ProductoID===id);

    /* COLORES */
    const colores=[...new Set(vars.map(v=>v.Color).filter(c=>c))];
    const divColores=document.getElementById("colores");
    divColores.innerHTML="";

    colores.forEach(c=>{
    const btn=document.createElement("button");
    btn.innerText=c;
    btn.className="option-btn unselected";

    btn.onclick=()=>{

    seleccion.color=c;
    document.querySelectorAll("#colores .option-btn").forEach(b=>{
    b.classList.remove("selected");
    b.classList.add("unselected");
    });
    btn.classList.remove("unselected");
    btn.classList.add("selected");
    };

    divColores.appendChild(btn);
    });

    /* TALLAS */
    const tallas=[...new Set(vars.map(v=>v.Talla).filter(t=>t && t!==""))];
    const seccionTallas=document.getElementById("seccionTallas");
    seccionTallas.innerHTML="";

    if(tallas.length>0){
    const titulo=document.createElement("h4");
    titulo.innerText="Talla";
    seccionTallas.appendChild(titulo);

    tallas.forEach(t=>{
    const btn=document.createElement("button");
    btn.innerText=t;
    btn.className="option-btn unselected";

    btn.onclick=()=>{

    seleccion.talla=t;

    document.querySelectorAll("#seccionTallas .option-btn").forEach(b=>{
    b.classList.remove("selected");
    b.classList.add("unselected");
    });
    btn.classList.remove("unselected");
    btn.classList.add("selected");
    };
    seccionTallas.appendChild(btn);
    });

    }else{
    seleccion.talla=null;
    }

    document.getElementById("comprarBtn").onclick = () => {

    const vars = variantes.filter(v => v.ProductoID === id);
    // Verificamos si este producto tiene tallas reales
    const tieneTalla = [...new Set(vars.map(v => v.Talla).filter(t => t && t !== ""))].length > 0;

    if (!seleccion.color) {
    alert("Elige color");
    return;
    }

    // Si el producto tiene talla, entonces es obligatoria
    if (tieneTalla && !seleccion.talla) {
    alert("Elige talla");
    return;
    }

    let mensaje = `Hola quiero comprar ${producto.Nombre} Color ${seleccion.color}`;

    if (tieneTalla) {
    mensaje += ` Talla ${seleccion.talla}`;
    }

    window.open(`https://wa.me/593999131523?text=${encodeURIComponent(mensaje)}`);

    };
    document.getElementById("whatsappPrincipal").style.display="none";
    document.getElementById("modal").style.display="flex";

    }

    function cerrarModal(){
    document.getElementById("modal").style.display="none";
    document.getElementById("whatsappPrincipal").style.display="block";
    }

    cargarDatos();

    </script>

    </body>
    </html>
