<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda</title>
<style>
body { font-family: Arial; margin: 0; background:#f5f5f5; }
header { background:#111; color:white; padding:15px; text-align:center; }
.grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.card img { width:100%; border-radius:8px; }
button { padding:10px; border:none; border-radius:6px; cursor:pointer; margin-top:10px; }
.whatsapp { position:fixed; bottom:20px; right:20px; background:#25D366; color:white; padding:15px; border-radius:50px; }
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; }
.modal-content { background:white; padding:20px; border-radius:10px; width:90%; max-width:500px; }
.option-btn { margin:5px; padding:8px 12px; border:1px solid #ccc; border-radius:5px; cursor:pointer; }
.option-btn.disabled { background:#ddd; cursor:not-allowed; }
.agotado { opacity:0.6; }
</style>
</head>
<body>

<header>
<h1>Mi Tienda</h1>
</header>

<div class="grid" id="catalogo"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="mNombre"></h2>
    <img id="mImagen" style="width:100%;border-radius:8px;">
    <p id="mPrecio"></p>
    <p id="mDescripcion"></p>

    <h4>Color</h4>
    <div id="colores"></div>

    <h4>Talla</h4>
    <div id="tallas"></div>

    <button id="comprarBtn">Consultar por WhatsApp</button>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<a class="whatsapp" target="_blank"
href="https://wa.me/593XXXXXXXXX?text=Hola%20quiero%20informacion">
WhatsApp
</a>

<script>
const URL_PRODUCTOS = "PEGA_AQUI_LINK_CSV_PRODUCTOS";
const URL_VARIANTES = "PEGA_AQUI_LINK_CSV_VARIANTES";

let productos = [];
let variantes = [];
let seleccion = { producto:null, color:null, talla:null };

function parseCSV(text) {
  const rows = text.trim().split("\n");
  const headers = rows.shift().split(",");
  return rows.map(row => {
    const values = row.split(",");
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = values[i]?.trim());
    return obj;
  });
}

async function cargarDatos() {
  const p = await fetch(URL_PRODUCTOS).then(r=>r.text());
  const v = await fetch(URL_VARIANTES).then(r=>r.text());

  productos = parseCSV(p);
  variantes = parseCSV(v);

  renderCatalogo();
}

function renderCatalogo() {
  const cont = document.getElementById("catalogo");
  cont.innerHTML = "";

  let disponibles = productos.filter(p=>p.Estado==="Disponible");
  let agotados = productos.filter(p=>p.Estado==="Agotado");

  [...disponibles, ...agotados].forEach(p=>{
    const card = document.createElement("div");
    card.className = "card";
    if(p.Estado==="Agotado") card.classList.add("agotado");

    card.innerHTML = `
      <img src="${p.Imagen}">
      <h3>${p.Nombre}</h3>
      <p>$${p.Precio}</p>
      <button onclick="abrirModal('${p.ID}')">
        ${p.Estado==="Agotado"?"Agotado":"Ver producto"}
      </button>
    `;
    cont.appendChild(card);
  });
}

function abrirModal(id) {
  const producto = productos.find(p=>p.ID===id);
  seleccion.producto = producto;
  seleccion.color = null;
  seleccion.talla = null;

  document.getElementById("mNombre").innerText = producto.Nombre;
  document.getElementById("mImagen").src = producto.Imagen;
  document.getElementById("mPrecio").innerText = "$"+producto.Precio;
  document.getElementById("mDescripcion").innerText = producto.Descripcion;

  const vars = variantes.filter(v=>v.ProductoID===id);

  const coloresUnicos = [...new Set(vars.map(v=>v.Color))];
  const tallasUnicas = [...new Set(vars.map(v=>v.Talla))];

  const divColores = document.getElementById("colores");
  divColores.innerHTML="";
  coloresUnicos.forEach(c=>{
    const btn = document.createElement("button");
    btn.innerText=c;
    btn.className="option-btn";
    btn.onclick=()=>{ seleccion.color=c; };
    divColores.appendChild(btn);
  });

  const divTallas = document.getElementById("tallas");
  divTallas.innerHTML="";
  tallasUnicas.forEach(t=>{
    const btn = document.createElement("button");
    btn.innerText=t;
    btn.className="option-btn";
    btn.onclick=()=>{ seleccion.talla=t; };
    divTallas.appendChild(btn);
  });

  document.getElementById("comprarBtn").onclick = ()=>{
    if(!seleccion.color || !seleccion.talla){
      alert("Selecciona color y talla");
      return;
    }
    const mensaje = `Hola quiero ${producto.Nombre} Color ${seleccion.color} Talla ${seleccion.talla}`;
    window.open(`https://wa.me/593XXXXXXXXX?text=${encodeURIComponent(mensaje)}`);
  };

  document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
  document.getElementById("modal").style.display="none";
}

cargarDatos();
</script>

</body>
</html>
